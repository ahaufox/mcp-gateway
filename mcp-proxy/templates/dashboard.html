<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCP Proxy Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .stagger-in {
            animation: fadeIn 0.5s ease-out forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stagger-in:nth-child(1) {
            animation-delay: 0.1s;
        }

        .stagger-in:nth-child(2) {
            animation-delay: 0.2s;
        }

        .stagger-in:nth-child(3) {
            animation-delay: 0.3s;
        }

        .stagger-in:nth-child(4) {
            animation-delay: 0.4s;
        }

        .bg-gradient-mesh {
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(168, 85, 247, 0.15) 0px, transparent 50%);
        }
    </style>
</head>

<body class="min-h-screen text-slate-200 bg-gradient-mesh flex flex-col leading-relaxed">
    {{template "navbar" .}}

    <div class="max-w-6xl w-full mx-auto px-4 py-12 flex-grow">
        <header class="mb-12 text-center stagger-in">
            <h1 class="text-4xl md:text-5xl font-bold text-white mb-4 tracking-tight">活跃 MCP 服务</h1>
            <p class="text-white/40 text-lg max-w-2xl mx-auto font-light">
                基于 GO 语言的高性能 MCP 网关，将多个 MCP 服务聚合为一个统一的智能接口。
            </p>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mb-12">
            {{range .Servers}}
            <div
                class="glass-card stagger-in group p-6 rounded-2xl border border-white/10 hover:border-white/20 transition-all duration-300 hover:scale-[1.02]">
                <div class="flex items-center justify-between mb-4">
                    <div class="flex items-center space-x-3">
                        <div
                            class="w-10 h-10 rounded-xl bg-indigo-500/20 flex items-center justify-center text-indigo-400">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                            </svg>
                        </div>
                        <h3 class="text-xl font-semibold text-white/90">{{.Name}}</h3>
                    </div>
                    <div class="flex items-center">
                        <span class="relative flex h-3 w-3 mr-2">
                            <span
                                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                        </span>
                        <span class="text-xs font-medium text-emerald-400/80 uppercase tracking-wider">已连接</span>
                    </div>
                </div>
                <div class="space-y-3">
                    <div class="text-xs font-mono text-white/30 truncate flex items-center">
                        <svg class="w-3.5 h-3.5 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                        {{.Route}}/
                    </div>
                </div>
                <div class="mt-6">
                    <a href="{{.Route}}/" target="_blank"
                        class="inline-flex items-center justify-center w-full px-4 py-2 rounded-xl bg-white/5 hover:bg-white/10 text-white/70 hover:text-white transition-colors text-sm font-medium border border-white/5">
                        打开端点
                        <svg class="w-4 h-4 ml-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"></path>
                        </svg>
                    </a>
                </div>
            </div>
            {{end}}
        </div>
    </div>

    <footer class="w-full py-8 border-t border-white/5 text-center text-white/20 text-sm italic stagger-in"
        style="animation-delay: 0.5s">
        © 2026 mcp-proxy
    </footer>
</body>

</html>
