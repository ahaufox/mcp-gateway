services:
  app:
    build: .
    pull_policy: always
    volumes:
      - ./config.json:/config/config.json
    ports:
      - "9090:9090"
    restart: always
    env_file:
      - .env
    depends_on:
      jules-mcp-server:
        condition: service_healthy

  jules-mcp-server:
    build:
      context: ../jules-mcp-server
      dockerfile: Dockerfile
    container_name: jules-mcp-server
    restart: unless-stopped
    expose:
      - "8000"
    env_file:
      - ../jules-mcp-server/.env
    healthcheck:
      test: [ "CMD", "python", "-c", "import socket; s = socket.socket(); s.connect(('localhost', 8000))" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
