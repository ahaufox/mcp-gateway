name: CI

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  go-gateway:
    name: Go Gateway
    runs-on: ubuntu-latest
    needs: frontend-web
    steps:
      - uses: actions/checkout@v4
      - name: Download frontend assets
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: mcp-proxy/internal/server/frontend/dist
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
          cache-dependency-path: mcp-proxy/go.sum
      - name: Vet & Format
        run: |
          cd mcp-proxy
          go fmt ./...
          go vet ./...
      - name: Build
        run: |
          cd mcp-proxy
          CGO_ENABLED=0 go build -o build/ ./...
      - name: Test
        run: |
          cd mcp-proxy
          go test -v ./...

  frontend-web:
    name: Frontend Web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: web/package-lock.json
      - name: Install dependencies
        run: |
          cd web
          npm ci
      - name: Lint
        run: |
          cd web
          npm run lint
      - name: Build
        run: |
          cd web
          npm run build
      - name: Upload frontend assets
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: mcp-proxy/internal/server/frontend/dist

  chart-server:
    name: Chart Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: |
          cd mcp-server-chart
          npm ci
      - name: Biome Linter & Formatter
        run: |
          cd mcp-server-chart
          npx biome check src/
      - name: Build
        run: |
          cd mcp-server-chart
          npm run build
      - name: Test
        run: |
          cd mcp-server-chart
          npx vitest run

  jules-server:
    name: Jules Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'
      - name: Sync dependencies
        run: |
          cd jules-mcp-server
          uv sync --dev
      - name: Lint (Ruff)
        run: |
          cd jules-mcp-server
          uv run ruff check
      - name: Type Check (Mypy)
        run: |
          cd jules-mcp-server
          uv run mypy .
      - name: Test
        run: |
          cd jules-mcp-server
          uv run python -m pytest
