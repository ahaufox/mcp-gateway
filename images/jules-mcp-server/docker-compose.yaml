services:
  jules-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jules-mcp-server
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - JULES_API_KEY=${JULES_API_KEY}
    env_file:
      - .env
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
